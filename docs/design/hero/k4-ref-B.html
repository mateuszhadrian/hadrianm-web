// vena-devices.jsx — generyczne urządzenia (bez logo): laptop + smartfon
// Ekrany renderują treść w natywnej skali (1280×800 / 390×800) i skalują ją transformem.
// Exports: VenaLaptop, VenaPhone, VenaFloorGlow

function VDScreenScaler({ dw, dh, scale, children }) {
  return (
    <div style={{ width: dw * scale, height: dh * scale, overflow: 'hidden', position: 'relative' }}>
      <div style={{ width: dw, height: dh, transform: `scale(${scale})`, transformOrigin: 'top left' }}>
        {children}
      </div>
    </div>
  );
}

function VDReflection() {
  return (
    <div style={{
      position: 'absolute', inset: 0, pointerEvents: 'none',
      background: 'linear-gradient(112deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.035) 26%, rgba(255,255,255,0) 45%)',
    }}></div>
  );
}

// Laptop — minimalne bezele, zaokrąglona pokrywa, baza z wycięciem. Bez znaków.
// chassis (0–100) steruje jasnością obudowy; bezelScale grubością ramek.
function VenaLaptop({ t, width = 920, bezelScale = 1, chassis = 50, children }) {
  const bezel = Math.max(2, Math.round(14 * bezelScale));
  const scale = (width - bezel * 2) / 1280;
  const g = (l) => `hsl(240 5% ${l.toFixed(1)}%)`;
  return (
    <div style={{ width, position: 'relative' }}>
      <div style={{
        background: `linear-gradient(180deg, ${g(4 + chassis * 0.28)} 0%, ${g(1.6 + chassis * 0.136)} 55%, ${g(1 + chassis * 0.098)} 100%)`,
        borderRadius: '20px 20px 6px 6px',
        padding: bezel,
        boxShadow: `inset 0 0 0 1px rgba(255,255,255,0.08), 0 80px 160px -40px rgba(0,0,0,0.85), 0 40px 130px -30px ${t.glow}`,
      }}>
        <div style={{ borderRadius: 8, overflow: 'hidden', position: 'relative', background: '#000' }}>
          <VDScreenScaler dw={1280} dh={800} scale={scale}>{children}</VDScreenScaler>
          <VDReflection></VDReflection>
        </div>
      </div>
      <div style={{
        position: 'relative', height: 19, width: '114%', marginLeft: '-7%',
        background: `linear-gradient(180deg, ${g(5 + chassis * 0.345)} 0%, ${g(2 + chassis * 0.178)} 45%, ${g(0.7 + chassis * 0.072)} 100%)`,
        borderRadius: '3px 3px 16px 16px',
        boxShadow: '0 26px 60px -16px rgba(0,0,0,0.8)',
      }}>
        <div style={{ position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)', width: width * 0.16, height: 7, background: 'rgba(0,0,0,0.45)', borderRadius: '0 0 10px 10px' }}></div>
      </div>
    </div>
  );
}

// Smartfon — neutralny (ani iPhone, ani konkretny Android): punch-hole, równe bezele.
function VenaPhone({ t, width = 250, bezelScale = 1, chassis = 50, children }) {
  const bezel = Math.max(2, Math.round(9 * bezelScale));
  const scale = (width - bezel * 2) / 390;
  const outerR = width * 0.165;
  const g = (l) => `hsl(240 5% ${l.toFixed(1)}%)`;
  return (
    <div style={{
      width, position: 'relative', boxSizing: 'border-box',
      background: `linear-gradient(180deg, ${g(4 + chassis * 0.30)} 0%, ${g(1.5 + chassis * 0.158)} 60%, ${g(1 + chassis * 0.118)} 100%)`,
      borderRadius: outerR,
      padding: bezel,
      boxShadow: `inset 0 0 0 1px rgba(255,255,255,0.10), 0 60px 120px -30px rgba(0,0,0,0.85), 0 30px 100px -20px ${t.glow}`,
    }}>
      <div style={{ borderRadius: outerR - bezel, overflow: 'hidden', position: 'relative', background: '#000' }}>
        <VDScreenScaler dw={390} dh={800} scale={scale}>{children}</VDScreenScaler>
        <div style={{ position: 'absolute', top: 9, left: '50%', transform: 'translateX(-50%)', width: 11, height: 11, borderRadius: 99, background: '#0a0a0a', boxShadow: 'inset 0 0 0 2px rgba(255,255,255,0.06)' }}></div>
        <VDReflection></VDReflection>
      </div>
    </div>
  );
}

// Miękka poświata "podłogi" pod lewitującymi urządzeniami
function VenaFloorGlow({ t, width = 900, height = 170, style }) {
  return (
    <div style={{
      width, height,
      borderRadius: '50%',
      background: `radial-gradient(ellipse at center, ${t.glow} 0%, rgba(0,0,0,0) 65%)`,
      filter: 'blur(10px)',
      pointerEvents: 'none',
      ...style,
    }}></div>
  );
}

// ── Klawiatura 3D (wewnątrz VenaLaptop3D) ──
function LaptopKeyboard3D({ width, depth, chassis }) {
  const g = (l) => `hsl(240 5% ${l.toFixed(1)}%)`;
  const keyBg = g(1.2 + chassis * 0.08);
  const padH = depth * 0.10;
  const padW = width * 0.05;
  const availH = depth - padH * 2;
  const availW = width - padW * 2;
  const touchH = availH * 0.22;
  const keyAreaH = availH - touchH - 8;
  const numRows = 6;
  const rowH = Math.max(6, Math.round((keyAreaH - 5 * 4) / numRows));
  const gap = Math.max(2, Math.round(availW * 0.004));

  const rowDefs = [
    { count: 15, extras: {} },
    { count: 14, extras: {} },
    { count: 14, extras: {} },
    { count: 13, extras: { 0: 1.8 } },
    { count: 11, extras: { 0: 2.5 } },
    { count: 5,  extras: { 0: 1.2, 1: 1.2, 2: 5.0, 3: 1.2, 4: 1.2 } },
  ];

  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
      <div style={{
        position: 'absolute', top: padH, left: padW, width: availW,
        display: 'flex', flexDirection: 'column', gap: 4,
      }}>
        {rowDefs.map(({ count, extras }, ri) => (
          <div key={ri} style={{ display: 'flex', gap, height: rowH, flexShrink: 0 }}>
            {Array.from({ length: count }, (_, ki) => (
              <div key={ki} style={{
                flex: extras[ki] || 1, height: rowH, minWidth: 0,
                background: keyBg, borderRadius: 2,
                boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.07), inset 0 -1px 0 rgba(0,0,0,0.28)',
              }} />
            ))}
          </div>
        ))}
        <div style={{
          width: availW * 0.28, height: touchH,
          alignSelf: 'center', marginTop: 8, flexShrink: 0,
          background: g(1.8 + chassis * 0.10), borderRadius: 7,
          boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.05)',
        }} />
      </div>
    </div>
  );
}

// ── Laptop 3D — pokrywa z ekranem + klawiatura wychodząca z zawiasu ──
// Używać wyłącznie w kontekście preserve-3d (Klatka C).
function VenaLaptop3D({ t, width = 920, bezelScale = 1, chassis = 50, screenTilt = 11, deckAngle = -84, showBase = true, children }) {
  const bezel = Math.max(2, Math.round(14 * bezelScale));
  const screenW = width - bezel * 2;
  const screenH = Math.round(screenW * 800 / 1280);
  const lidH = screenH + bezel * 2;
  const baseD = Math.round(width * 0.62);
  const edgeT = 12;

  const g = (l) => `hsl(240 5% ${l.toFixed(1)}%)`;
  const cFront = `linear-gradient(180deg, ${g(4+chassis*0.28)} 0%, ${g(1.6+chassis*0.136)} 55%, ${g(1+chassis*0.098)} 100%)`;
  const cBase  = `linear-gradient(160deg, ${g(3.5+chassis*0.22)} 0%, ${g(2+chassis*0.16)} 100%)`;
  const cEdgeD = g(1.5 + chassis * 0.10);
  const cEdgeL = g(2.8 + chassis * 0.15);

  return (
    <div style={{ width, height: lidH, position: 'relative', transformStyle: 'preserve-3d' }}>

      {/* ── Pokrywa (ekran + krawędzie) — odchylona do tyłu wokół zawiasu u dołu ── */}
      <div style={{
        position: 'absolute', inset: 0, transformStyle: 'preserve-3d',
        transform: `rotateX(${screenTilt}deg)`, transformOrigin: 'center bottom',
      }}>
        {/* Ekran (główna ściana) */}
        <div style={{
          position: 'absolute', inset: 0,
          background: cFront, borderRadius: '18px 18px 4px 4px',
          padding: bezel, boxSizing: 'border-box',
          boxShadow: `inset 0 0 0 1px rgba(255,255,255,0.08), 0 80px 160px -40px rgba(0,0,0,0.85), 0 40px 130px -30px ${t.glow}`,
        }}>
          <div style={{ borderRadius: 8, overflow: 'hidden', position: 'relative', background: '#000', height: '100%' }}>
            <VDScreenScaler dw={1280} dh={800} scale={screenW / 1280}>{children}</VDScreenScaler>
            <VDReflection />
          </div>
        </div>

        {/* Górna krawędź pokrywy */}
        <div style={{
          position: 'absolute', top: 0, left: 0, width, height: edgeT,
          background: cEdgeD, borderRadius: '18px 18px 0 0',
          transform: 'rotateX(-90deg)', transformOrigin: 'center top',
        }} />
        {/* Prawa krawędź pokrywy */}
        <div style={{
          position: 'absolute', top: 0, right: 0, width: edgeT, height: lidH,
          background: cEdgeL,
          transform: 'rotateY(-90deg)', transformOrigin: 'right center',
        }} />
        {/* Lewa krawędź pokrywy */}
        <div style={{
          position: 'absolute', top: 0, left: 0, width: edgeT, height: lidH,
          background: cEdgeD,
          transform: 'rotateY(90deg)', transformOrigin: 'left center',
        }} />
      </div>

      {/* ── Podstawa z klawiaturą — płaska, zawias u dołu pokrywy ── */}
      {showBase && (
      <div style={{
        position: 'absolute', top: lidH, left: 0, width, height: baseD,
        background: cBase, borderRadius: '3px 3px 16px 16px',
        transform: `rotateX(${deckAngle}deg)`, transformOrigin: 'center top',
        transformStyle: 'preserve-3d',
        boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.06)',
      }}>
        <LaptopKeyboard3D width={width} depth={baseD} chassis={chassis} />
        {/* Prawa krawędź podstawy (grubość) */}
        <div style={{
          position: 'absolute', top: 0, right: 0, width: edgeT, height: baseD,
          background: cEdgeL,
          transform: 'rotateY(-90deg)', transformOrigin: 'right center',
        }} />
        {/* Lewa krawędź podstawy (grubość) */}
        <div style={{
          position: 'absolute', top: 0, left: 0, width: edgeT, height: baseD,
          background: cEdgeD,
          transform: 'rotateY(90deg)', transformOrigin: 'left center',
        }} />
        {/* Przednia krawędź podstawy (front lip — bliżej widza) */}
        <div style={{
          position: 'absolute', bottom: 0, left: 0, width, height: edgeT + 10,
          background: `linear-gradient(180deg, ${g(2.4+chassis*0.14)} 0%, ${g(1+chassis*0.09)} 100%)`,
          borderRadius: '0 0 16px 16px',
          transform: 'rotateX(-90deg)', transformOrigin: 'center bottom',
        }} />
      </div>
      )}
    </div>
  );
}

// ── Telefon 3D — z widoczną grubością krawędzi bocznych ──
function VenaPhone3D({ t, width = 250, bezelScale = 1, chassis = 50, edge = 9, children }) {
  const bezel = Math.max(2, Math.round(9 * bezelScale));
  const scale = (width - bezel * 2) / 390;
  const phoneH = Math.round(800 * scale) + bezel * 2;
  const outerR = width * 0.165;
  const edgeT = Math.max(0, edge);                       // głębokość bocznej ścianki (grubość telefonu)
  const edgeLayers = Math.max(8, Math.round(edgeT * 1.8)); // gęstość warstw rośnie z grubością (bez szczelin)
  const edgeStep = edgeLayers ? edgeT / edgeLayers : 0;

  const g = (l) => `hsl(240 5% ${l.toFixed(1)}%)`;
  const cBody = `linear-gradient(180deg, ${g(4+chassis*0.30)} 0%, ${g(1.5+chassis*0.158)} 60%, ${g(1+chassis*0.118)} 100%)`;
  const cEdgeD = g(1.5 + chassis * 0.10);
  const cEdgeL = g(2.8 + chassis * 0.15);

  return (
    <div style={{ width, height: phoneH, position: 'relative', transformStyle: 'preserve-3d' }}>
      {/* Boczna ścianka (grubość) — wytłoczenie z warstw, podąża za zaokrągleniem także na rogach */}
      {Array.from({ length: edgeLayers }).map((_, i) => {
        const d = (i + 1) / edgeLayers;            // 0→1 w głąb
        const lz = 2 + chassis * 0.13 - d * 1.6;   // ciemniej ku tyłowi
        return (
          <div key={i} style={{
            position: 'absolute', inset: 0,
            borderRadius: outerR,
            background: `linear-gradient(90deg, ${g(lz*0.7)} 0%, ${g(lz)} 45%, ${g(lz*1.5)} 100%)`,
            transform: `translateZ(${-(i + 1) * edgeStep}px)`,
            boxShadow: i === edgeLayers - 1 ? '0 0 0 1px rgba(0,0,0,0.4)' : 'none',
          }} />
        );
      })}
      {/* Korpus + ekran (na wierzchu) */}
      <div style={{
        position: 'absolute', inset: 0, transform: 'translateZ(0.5px)',
        background: cBody, borderRadius: outerR,
        padding: bezel, boxSizing: 'border-box',
        boxShadow: `inset 0 0 0 1px rgba(255,255,255,0.10), 0 60px 120px -30px rgba(0,0,0,0.85), 0 30px 100px -20px ${t.glow}`,
      }}>
        <div style={{ borderRadius: outerR - bezel, overflow: 'hidden', position: 'relative', background: '#000', height: '100%' }}>
          <VDScreenScaler dw={390} dh={800} scale={scale}>{children}</VDScreenScaler>
          <div style={{ position: 'absolute', top: 9, left: '50%', transform: 'translateX(-50%)', width: 11, height: 11, borderRadius: 99, background: '#0a0a0a', boxShadow: 'inset 0 0 0 2px rgba(255,255,255,0.06)' }} />
          <VDReflection />
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { VenaLaptop, VenaPhone, VenaFloorGlow, VenaLaptop3D, VenaPhone3D });

// vena-frames-v2.jsx — runda 2: klatki z tłem-"chmurką", brandem hadrianm,
// nowymi hasłami i podpięciem pod suwaki Tweaks (tw).
// Exports: VStage2, HBrand, VHeadline2, Frame2A, Frame2B, Frame2C, Frame2Mobile

// Tweaks → wartości pochodne (z bezpiecznymi domyślnymi)
function twv(tw, key, dflt) {return tw && tw[key] != null ? tw[key] : dflt;}
function twGlow(t, tw) {return `rgba(${t.glowRGB},${(t.glowA * twv(tw, 'glow', 100) / 100).toFixed(3)})`;}
function twBezel(tw) {return twv(tw, 'bezel', 100) / 100;}
function twChassis(tw) {return twv(tw, 'chassis', 50);}
function twGapDelta(tw) {return twv(tw, 'gap', 40) - 40;}
function twPhoneEdge(tw) {return twv(tw, 'phoneEdge', 9);}

// Ziarno filmowe (feTurbulence) jako data-URI — nakładka na tło
const VGRAIN = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(
  "<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"
);

// ── Scena v2: ciemne tło + rozmyta barwna "chmurka" (docelowo reaguje na kursor) ──
function VStage2({ t, tw, w = 1920, h = 1080, label, children, style }) {
  const b = twv(tw, 'bgBrightness', 100) / 100;
  return (
    <div data-screen-label={label} style={{ width: w, height: h, position: 'relative', overflow: 'hidden', background: t.bg, fontFamily: t.body, ...style }}>
      <div data-bg-blobs="true" style={{ position: 'absolute', inset: 0, opacity: Math.min(1, b) }}>
        {t.blobs.map((bl, i) => {
          const d = bl.r * 2 * w;
          return (
            <div key={i} style={{
              position: 'absolute', left: bl.x * w - d / 2, top: bl.y * h - d / 2,
              width: d, height: d, borderRadius: '50%',
              background: `radial-gradient(closest-side, ${bl.c} 0%, rgba(0,0,0,0) 72%)`,
              filter: `blur(${Math.round(w * 0.025)}px)`
            }}></div>);

        })}
        {t.fog && t.fogStreaks ? t.fogStreaks.map((s, i) =>
        <div key={`fog-${i}`} style={{
          position: 'absolute', left: s.x * w - s.w * w / 2, top: s.y * h - s.h * h / 2,
          width: s.w * w, height: s.h * h, transform: `rotate(${s.rot}deg)`,
          background: `radial-gradient(closest-side, ${s.c} 0%, rgba(0,0,0,0) 70%)`,
          borderRadius: '50%', filter: `blur(${Math.round(w * 0.04)}px)`, mixBlendMode: 'screen'
        }}></div>
        ) : null}
      </div>
      {b > 1 ? <div style={{ position: 'absolute', inset: 0, background: '#fff', opacity: (b - 1) * 0.10 }}></div> : null}
      <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(135% 100% at 50% 45%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.5) 100%)' }}></div>
      {t.fog ? <div style={{ position: 'absolute', inset: 0, backgroundImage: `url("${VGRAIN}")`, backgroundSize: `${Math.round(w * 0.16)}px`, opacity: 0.42, mixBlendMode: 'overlay', pointerEvents: 'none' }}></div> : null}
      {t.mesh ? (() => {
        const dens = twv(tw, 'meshDensity', 80);
        const ms = 3 + (1 - dens / 100) * 13; // px: większa gęstość → mniejszy rozstaw
        const sz = twv(tw, 'meshDotSize', 55); // 0–100 → wielkość kropek
        const coreFrac = 0.12 + sz / 100 * 0.34; // 0.12 .. 0.46
        const core = (ms * coreFrac).toFixed(2);
        const fade = (ms * Math.min(0.62, coreFrac * 1.7)).toFixed(2);
        return <div data-bg-mesh="true" style={{
          position: 'absolute', inset: 0, pointerEvents: 'none', mixBlendMode: 'multiply', opacity: twv(tw, 'meshOpacity', 85) / 100,
          backgroundImage: `radial-gradient(circle at center, rgba(0,0,0,0.96) ${core}px, rgba(0,0,0,0) ${fade}px)`,
          backgroundSize: `${ms.toFixed(2)}px ${ms.toFixed(2)}px`
        }}></div>;
      })() : null}
      {children}
    </div>);

}

// ── Brand: hadrianm — końcowe "m" przyciemnione ──
function HBrand({ t, size = 18, style }) {
  return (
    <div style={{ fontFamily: t.body, fontWeight: 800, fontSize: size, letterSpacing: '0.01em', color: t.ink, ...style }}>hadrian<span style={{ color: t.muted }}>m</span></div>);

}

// ── Nagłówek: "strona zaskakująco inna" — 3 tryby typograficzne ──
function VHeadline2({ t, size = 144, width = 1500, align = 'center', style }) {
  const base = {
    margin: 0, maxWidth: width, fontFamily: t.display, fontWeight: t.displayWeight,
    fontSize: size, lineHeight: 1.04, letterSpacing: t.tracking,
    color: t.ink, textAlign: align, textWrap: 'balance', ...style
  };
  const serif = {
    fontFamily: t.serifAccent, fontStyle: 'italic', fontWeight: 400, fontSize: '1.06em',
    letterSpacing: '0', background: t.serifGradient,
    WebkitBackgroundClip: 'text', backgroundClip: 'text', WebkitTextFillColor: 'transparent', color: 'transparent'
  };
  if (t.headlineMode === 'mix') {
    return <h1 style={base}>strona zaskakująco <span style={serif}>inna</span></h1>;
  }
  if (t.headlineMode === 'twotone') {
    return <h1 style={base}><span style={{ color: t.muted }}>strona zaskakująco</span> <span style={{ color: t.ink }}>inna</span></h1>;
  }
  return <h1 style={base}>strona zaskakująco <span style={{ color: t.accent, textShadow: t.textGlow ? `0 0 70px rgba(${t.glowRGB},0.55)` : 'none' }}>inna</span></h1>;
}

// Hasło 01 — "wzniecaj emocje" w trybie zgodnym z nagłówkiem
function VSloganOne({ t, size = 58 }) {
  const base = { margin: 0, fontFamily: t.display, fontWeight: t.displayWeight, fontSize: size, lineHeight: 1.08, letterSpacing: t.tracking, color: t.ink, textWrap: 'balance' };
  const serif = {
    fontFamily: t.serifAccent, fontStyle: 'italic', fontWeight: 400, fontSize: '1.06em',
    background: t.serifGradient, WebkitBackgroundClip: 'text', backgroundClip: 'text', WebkitTextFillColor: 'transparent', color: 'transparent'
  };
  if (t.headlineMode === 'mix') return <h2 style={base}>wzniecaj <span style={serif}>emocje</span></h2>;
  if (t.headlineMode === 'twotone') return <h2 style={base}><span style={{ color: t.muted }}>wzniecaj</span> emocje</h2>;
  return <h2 style={base}>wzniecaj <span style={{ color: t.accent, textShadow: t.textGlow ? `0 0 50px rgba(${t.glowRGB},0.55)` : 'none' }}>emocje</span></h2>;
}

// Hasła w finalnym układzie (hierarchia 01 > 02 ≥ 03)
function VSlogans2({ t, width = 620 }) {

        <VSloganOne t={t} size={60}></VSloganOne>

      <div style={{ display: 'flex', gap: 22, alignItems: 'baseline', borderTop: `1px solid ${t.line}`, padding: '26px 0' }}>
        <span style={{ fontFamily: VMONO, fontSize: 13, color: t.accent, flexShrink: 0 }}>02</span>
        <p style={{ margin: 0, fontFamily: t.body, fontWeight: 600, fontSize: 26, lineHeight: 1.3, color: t.muted }}>Pierwsze wrażenie. Zaprojektowane.</p>
      </div>
      <div style={{ display: 'flex', gap: 22, alignItems: 'baseline', borderTop: `1px solid ${t.line}`, padding: '26px 0 0' }}>
        <span style={{ fontFamily: VMONO, fontSize: 13, color: t.accent, flexShrink: 0 }}>03</span>
        <p style={{ margin: 0, fontFamily: t.body, fontWeight: 600, fontSize: 26, lineHeight: 1.3, color: t.muted }}>Płynnie. Na każdym ekranie.</p>
      </div>
    </div>);

}

// ── KLATKA A — tylko hasło ──

}

// ── KLATKA C — po ruchu kamery: urządzenia w 3D po prawej, hasła po lewej ──

Object.assign(window, { VStage2, HBrand, VHeadline2, VSloganOne, VSlogans2, Frame2A, Frame2B, Frame2C, Frame2Mobile });

const W = 1920, H = 1080;
const t = { ...VENA_THEMES_V2.crimson, blobs: [], mesh: false, fog: false };
const tw = { chassis: 88, glow: 174, bezel: 99, gap: 20, phoneEdge: 30, bgBrightness: 100, meshOpacity: 0, meshDensity: 43, meshDotSize: 26 };

function scaleStage() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  document.getElementById('stage').style.transform = 'translate(-50%, -50%) scale(' + s + ')';
}
window.addEventListener('resize', scaleStage);

ReactDOM.createRoot(document.getElementById('stage')).render(
  React.createElement(Frame2B, { t, tw })
);

setTimeout(scaleStage, 200);
</script>
