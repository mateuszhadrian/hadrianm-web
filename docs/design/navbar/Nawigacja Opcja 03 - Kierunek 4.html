<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hadrianm · Nawigacja — Opcja 03 (Rozstrzelone capsy / Halo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ─────────────────────────────────────────────────────────────
     KIERUNEK 4 — Opcja 03 · „Rozstrzelone capsy / Halo"
     Pasek nawigacji: same linki oddzielone slashem (nie buttony).
     Tło: pełna czerń. Hover: napis rozbłyskuje bielą + miękkie
     koralowe halo za słowem.
     Wszystkie kolory / rozmiary trzymane w zmiennych poniżej.
     ───────────────────────────────────────────────────────────── */
  :root{
    --bg:#000000;                       /* tło — czysta czerń */
    --ink:#F5F0EC;                      /* napis aktywny / hover */
    --muted:rgba(245,240,236,0.58);
    --faint:rgba(245,240,236,0.34);     /* napis spoczynkowy */
    --line:rgba(245,240,236,0.12);      /* hairline / slash */
    --accent:#FF5A47;                   /* koral — akcent / halo */
    --glow:255,90,71;                   /* RGB akcentu do poświaty */
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Archivo',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  .wrap{max-width:1240px;margin:0 auto;padding:64px 40px 96px;}

  /* ── DESKTOP — pasek nawigacji ─────────────────────────────── */
  .bar{display:flex;align-items:center;justify-content:space-between;
    padding:26px 4px;border-bottom:1px solid var(--line);}
  .bar .brand{font-weight:800;font-size:19px;letter-spacing:0.01em;}
  .bar .brand b{color:var(--muted);font-weight:800;}
  .bar .right{display:flex;align-items:center;gap:26px;}

  /* zestaw linków rozdzielonych slashem */
  .nav{display:flex;align-items:center;gap:22px;}
  .nav a{position:relative;text-decoration:none;cursor:pointer;white-space:nowrap;
    color:var(--faint);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:0.26em;
    transition:color .35s ease;}
  .nav .sep{color:var(--line);font-size:12px;user-select:none;}
  /* halo za słowem + rozbłysk bieli na hover */
  .nav a::before{content:'';position:absolute;inset:-16px -20px;z-index:-1;border-radius:40px;
    background:radial-gradient(closest-side,rgba(var(--glow),0.32) 0%,rgba(0,0,0,0) 75%);
    opacity:0;filter:blur(4px);transition:opacity .4s ease;}
  .nav a:hover{color:var(--ink);}
  .nav a:hover::before{opacity:1;}

  /* przełącznik języka — w stylu paska */
  .lang{display:flex;align-items:center;gap:10px;padding-left:22px;margin-left:0;
    border-left:1px solid var(--line);font-family:var(--mono);font-size:12px;letter-spacing:0.16em;}
  .lang button{font:inherit;letter-spacing:inherit;background:none;border:none;cursor:pointer;
    color:var(--faint);transition:color .3s,text-shadow .3s;}
  .lang button.on{color:var(--ink);text-shadow:0 0 16px rgba(var(--glow),0.5);}
  .lang .lsep{color:var(--line);}

  /* ── MOBILE — telefon + hamburger menu ─────────────────────── */
  .phones{display:flex;gap:34px;margin-top:64px;flex-wrap:wrap;align-items:flex-start;}
  .phonecol{display:flex;flex-direction:column;}
  .phone{position:relative;width:300px;height:560px;border-radius:42px;background:#101010;
    padding:11px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.07),0 50px 110px -40px rgba(0,0,0,0.9);}
  .phscreen{position:relative;width:100%;height:100%;border-radius:32px;overflow:hidden;background:#000;}
  .notch{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:96px;height:7px;
    border-radius:99px;background:rgba(255,255,255,0.10);z-index:5;}

  .topbar{position:relative;z-index:3;display:flex;align-items:center;justify-content:space-between;
    padding:30px 22px 0;}
  .topbar .brand{font-weight:800;font-size:16px;}
  .topbar .brand b{color:var(--muted);}

  /* hamburger 26/16 px → morphuje w świecący „×" */
  .burger{position:relative;width:26px;height:18px;cursor:pointer;flex-shrink:0;}
  .burger span{position:absolute;right:0;height:2px;background:var(--ink);border-radius:2px;
    transition:transform .38s cubic-bezier(.5,0,.2,1),width .38s,top .38s;}
  .burger span:nth-child(1){top:3px;width:26px;}
  .burger span:nth-child(2){top:13px;width:16px;}
  .phone.open .burger span:nth-child(1){top:8px;width:26px;transform:rotate(45deg);
    box-shadow:0 0 16px rgba(var(--glow),0.6);}
  .phone.open .burger span:nth-child(2){top:8px;width:26px;transform:rotate(-45deg);
    box-shadow:0 0 16px rgba(var(--glow),0.6);}

  /* panel menu — wyśrodkowany stos capsów z halo */
  .menu{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;
    background:rgba(0,0,0,0.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    padding:84px 26px 30px;opacity:0;visibility:hidden;transition:opacity .4s ease,visibility .4s;}
  .phone.open .menu{opacity:1;visibility:visible;}
  .menu .mhead{font-family:var(--mono);font-size:10px;letter-spacing:0.3em;color:var(--accent);
    text-transform:uppercase;margin-bottom:26px;text-align:center;}
  .menu nav{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .menu nav a{position:relative;text-decoration:none;white-space:nowrap;
    color:var(--faint);font-weight:500;font-size:16px;text-transform:uppercase;letter-spacing:0.24em;
    padding:17px 0;opacity:0;transform:translateY(10px);
    transition:opacity .4s ease,transform .4s ease,color .3s;}
  .menu nav a::before{content:'';position:absolute;inset:-6px -26px;z-index:-1;border-radius:40px;
    background:radial-gradient(closest-side,rgba(var(--glow),0.34),rgba(0,0,0,0) 75%);
    opacity:0;filter:blur(4px);transition:opacity .4s;}
  .menu nav a:hover,.menu nav a:active{color:var(--ink);}
  .menu nav a:hover::before,.menu nav a:active::before{opacity:1;}
  .phone.open .menu nav a{opacity:1;transform:none;}
  .phone.open .menu nav a:nth-child(1){transition-delay:.06s;}
  .phone.open .menu nav a:nth-child(2){transition-delay:.10s;}
  .phone.open .menu nav a:nth-child(3){transition-delay:.14s;}
  .phone.open .menu nav a:nth-child(4){transition-delay:.18s;}
  .phone.open .menu nav a:nth-child(5){transition-delay:.22s;}
  .phone.open .menu nav a:nth-child(6){transition-delay:.26s;}

  .menu .mlang{margin-top:auto;display:flex;align-items:center;justify-content:center;gap:12px;
    font-family:var(--mono);font-size:12px;letter-spacing:0.18em;padding-top:24px;
    border-top:1px solid var(--line);}
  .menu .mlang .lab{color:var(--faint);margin-right:2px;}
  .menu .mlang button{font:inherit;letter-spacing:inherit;background:none;border:none;cursor:pointer;
    color:var(--faint);transition:color .3s,text-shadow .3s;}
  .menu .mlang button.on{color:var(--ink);text-shadow:0 0 16px rgba(var(--glow),0.5);}
  .menu .mlang .lsep{color:var(--line);}

  @media(max-width:720px){
    .wrap{padding:44px 20px 80px;}
    .bar .nav{display:none;}     /* na wąskim ekranie pasek desktop chowamy — patrz telefon */
  }
</style>
</head>
<body>
<div class="wrap">
  <!-- ════════ DESKTOP ════════ -->
  <div class="bar">
    <div class="brand">hadrian<b>m</b></div>
    <div class="right">
      <nav class="nav">
        <a href="#" data-pl="Dla kogo" data-en="Who it's for">Dla kogo</a>
        <span class="sep">/</span>
        <a href="#" data-pl="Oferta" data-en="Services">Oferta</a>
        <span class="sep">/</span>
        <a href="#" data-pl="Realizacje" data-en="Work">Realizacje</a>
        <span class="sep">/</span>
        <a href="#" data-pl="O mnie" data-en="About">O mnie</a>
        <span class="sep">/</span>
        <a href="#" data-pl="FAQ" data-en="FAQ">FAQ</a>
        <span class="sep">/</span>
        <a href="#" data-pl="Kontakt" data-en="Contact">Kontakt</a>
      </nav>
      <div class="lang">
        <button data-lang="pl" class="on">PL</button>
        <span class="lsep">/</span>
        <button data-lang="en">EN</button>
      </div>
    </div>
  </div>

  <!-- ════════ MOBILE ════════ -->
  <div class="phones">
    <div class="phonecol">
      <div class="phone">
        <div class="phscreen">
          <div class="notch"></div>
          <div class="topbar">
            <div class="brand">hadrian<b>m</b></div>
            <div class="burger" data-toggle><span></span><span></span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="phonecol">
      <div class="phone open">
        <div class="phscreen">
          <div class="notch"></div>
          <div class="topbar">
            <div class="brand">hadrian<b>m</b></div>
            <div class="burger" data-toggle><span></span><span></span></div>
          </div>
          <div class="menu">
            <div class="mhead">Menu</div>
            <nav>
              <a href="#" data-pl="Dla kogo" data-en="Who it's for">Dla kogo</a>
              <a href="#" data-pl="Oferta" data-en="Services">Oferta</a>
              <a href="#" data-pl="Realizacje" data-en="Work">Realizacje</a>
              <a href="#" data-pl="O mnie" data-en="About">O mnie</a>
              <a href="#" data-pl="FAQ" data-en="FAQ">FAQ</a>
              <a href="#" data-pl="Kontakt" data-en="Contact">Kontakt</a>
            </nav>
            <div class="mlang">
              <span class="lab">Język</span>
              <button data-lang="pl" class="on">PL</button>
              <span class="lsep">/</span>
              <button data-lang="en">EN</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  // ── przełącznik języka (steruje wszystkimi etykietami naraz) ──
  function setLang(l){
    document.querySelectorAll('a[data-pl]').forEach(function(a){
      a.textContent = (l === 'pl') ? a.dataset.pl : a.dataset.en;
    });
    document.querySelectorAll('button[data-lang]').forEach(function(b){
      b.classList.toggle('on', b.dataset.lang === l);
    });
    document.documentElement.lang = l;
  }
  document.addEventListener('click', function(e){
    var b = e.target.closest('button[data-lang]');
    if(b){ e.preventDefault(); setLang(b.dataset.lang); }
  });

  // ── hamburger: otwiera / zamyka menu w danym telefonie ──
  document.addEventListener('click', function(e){
    var t = e.target.closest('[data-toggle]');
    if(t){ e.preventDefault(); t.closest('.phone').classList.toggle('open'); }
  });
})();
</script>
</body>
</html>
