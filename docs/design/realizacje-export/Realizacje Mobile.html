<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Realizacje — Mobile (stos)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --rz-accent: #e3be7f;
        --rz-ring: rgba(227, 190, 127, 0.5);
        --rz-ring-bg: rgba(227, 190, 127, 0.06);
        --rz-glow: rgba(227, 190, 127, 0.45);
        --rz-cta-ink: #160a08;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
      }
      body {
        background: #0a0709;
        font-family: "Archivo", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      button {
        font: inherit;
      }

      .rz-card {
        appearance: none;
        -webkit-appearance: none;
        background: transparent;
        border: none;
        padding: 0;
        margin: 0;
        color: inherit;
        font: inherit;
        cursor: pointer;
        position: relative;
        text-align: left;
        outline: none;
      }
      .rz-card::before {
        content: "";
        position: absolute;
        inset: -18px -20px;
        border-radius: 22px;
        border: 1px solid transparent;
        background: transparent;
        box-shadow: 0 0 0 0 transparent;
        transition:
          border-color 0.35s cubic-bezier(0.2, 0.7, 0.2, 1),
          background 0.35s,
          box-shadow 0.4s;
        pointer-events: none;
        z-index: 0;
      }
      .rz-card > * {
        position: relative;
        z-index: 1;
      }
      .rz-card:focus-visible::before {
        border-color: var(--rz-ring);
      }

      .rz-media-inner {
        transition: transform 0.45s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      .rz-cta {
        transition:
          background 0.25s,
          color 0.25s,
          border-color 0.25s;
      }
      .rz-cta-arrow {
        transition: transform 0.3s cubic-bezier(0.2, 0.7, 0.2, 1);
      }

      .rz-card:active .rz-cta {
        background: var(--rz-accent);
        color: var(--rz-cta-ink) !important;
        border-color: var(--rz-accent) !important;
      }
      .rz-card:hover .rz-cta {
        background: var(--rz-accent);
        color: var(--rz-cta-ink) !important;
        border-color: var(--rz-accent) !important;
      }
      .rz-card:hover .rz-cta-arrow {
        transform: translateX(4px);
      }
      .rz-card:hover .rz-media-inner {
        transform: scale(1.035);
      }
      .rz-card:hover::before {
        border-color: var(--rz-ring);
        background: var(--rz-ring-bg);
        box-shadow: 0 0 70px -8px var(--rz-glow);
      }

      .rz-ghost {
        border: 1.5px dashed rgba(245, 240, 236, 0.18);
        border-radius: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: rgba(245, 240, 236, 0.4);
        min-height: 150px;
        width: 100%;
      }

      @media (prefers-reduced-motion: reduce) {
        .rz-media-inner,
        .rz-cta-arrow {
          transition: none;
        }
        .rz-card:hover .rz-media-inner {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <template id="__bundler_thumbnail">

        <rect width="100" height="100" fill="#0A0709"></rect>

          height="38"
          rx="4"
          fill="#1a1418"

    <script

    <script type="text/babel" src="realizacje-data.jsx"></script>
    <script type="text/babel" src="realizacje-devices.jsx"></script>
    <script type="text/babel" src="realizacje-card.jsx"></script>
    <script type="text/babel" src="realizacje-mobile.jsx"></script>

    <script type="text/babel">

        };
        return (

            <div

                <h2

                </p>
              </section>

              <main style={{ padding: "34px 0 90px" }}>

      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        <MobileRealizacje></MobileRealizacje>,
      );
    </script>
